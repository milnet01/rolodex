name: Build binaries

# Builds a self-contained, single-file Rolodex binary for Linux, Windows, and macOS with
# PyInstaller (packaging/rolodex.spec). Run it manually from the Actions tab (workflow_dispatch)
# to get downloadable artifacts, or push a `v*` tag to also publish them to a GitHub Release.
#
# Each OS installs its GTK 4 / libadwaita + PyGObject runtime (Linux: apt, Windows: MSYS2,
# macOS: Homebrew), then calls the SAME build+self-test script a developer runs locally
# (packaging/{linux,windows,macos}-build.sh). Keeping the build logic in those scripts means
# CI-local.sh and this workflow can't drift. The Windows and macOS jobs are best-effort — GTK
# is Linux-first.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to attach binaries to a Release on tag builds

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing must not cancel the others
      matrix:
        include:
          - os: ubuntu-latest
            asset: rolodex-linux-x86_64
          - os: windows-latest
            asset: rolodex-windows-x86_64.exe
          - os: macos-latest
            asset: rolodex-macos-arm64

    steps:
      - uses: actions/checkout@v4

      # ---- Linux: GTK stack from apt, PyInstaller from pip ----
      - name: Install GTK stack (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi python3-gi-cairo python3-cairo xvfb \
            gir1.2-gtk-4.0 gir1.2-adw-1 libgtk-4-1 libadwaita-1-0
          python3 -m pip install --break-system-packages --upgrade pyinstaller cryptography
      - name: Build + self-test (Linux)
        if: runner.os == 'Linux'
        run: bash packaging/linux-build.sh "${{ matrix.asset }}"

      # ---- Windows: GTK stack + Python from MSYS2 (UCRT64) ----
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cryptography
            mingw-w64-ucrt-x86_64-python-pip
      - name: Build + self-test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pyinstaller
          bash packaging/windows-build.sh "${{ matrix.asset }}"

      # ---- macOS: GTK stack from Homebrew (unsigned build) ----
      - name: Build + self-test (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gtk4 libadwaita pygobject3 py3cairo pyinstaller
          "$(brew --prefix)/bin/python3" -m pip install --break-system-packages --upgrade cryptography || true
          bash packaging/macos-build.sh "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
