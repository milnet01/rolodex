<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Card stack (back cards, slightly offset) -->
  <rect x="22" y="18" width="84" height="64" rx="4" ry="4"
        fill="#8899aa" stroke="#667788" stroke-width="1.5"/>
  <rect x="18" y="22" width="84" height="64" rx="4" ry="4"
        fill="#99aabb" stroke="#778899" stroke-width="1.5"/>

  <!-- Main card (front) -->
  <rect x="14" y="26" width="84" height="64" rx="4" ry="4"
        fill="#dde3ea" stroke="#8899aa" stroke-width="2"/>

  <!-- Lines on main card (simulating text) -->
  <rect x="24" y="38" width="44" height="3" rx="1.5" fill="#8899aa"/>
  <rect x="24" y="48" width="56" height="2" rx="1" fill="#aab5c2"/>
  <rect x="24" y="56" width="50" height="2" rx="1" fill="#aab5c2"/>
  <rect x="24" y="64" width="40" height="2" rx="1" fill="#aab5c2"/>
  <rect x="24" y="72" width="48" height="2" rx="1" fill="#aab5c2"/>

  <!-- Index tabs on the right side -->
  <rect x="98" y="20" width="16" height="14" rx="3" ry="3"
        fill="#6688aa" stroke="#557799" stroke-width="1"/>
  <rect x="98" y="38" width="16" height="14" rx="3" ry="3"
        fill="#7799bb" stroke="#6688aa" stroke-width="1"/>
  <rect x="98" y="56" width="16" height="14" rx="3" ry="3"
        fill="#88aacc" stroke="#7799bb" stroke-width="1"/>
  <rect x="98" y="74" width="16" height="14" rx="3" ry="3"
        fill="#99bbdd" stroke="#88aacc" stroke-width="1"/>

  <!-- Tab labels (A, B, C, D) -->
  <text x="106" y="31" font-family="sans-serif" font-size="8"
        font-weight="bold" fill="#fff" text-anchor="middle">A</text>
  <text x="106" y="49" font-family="sans-serif" font-size="8"
        font-weight="bold" fill="#fff" text-anchor="middle">B</text>
  <text x="106" y="67" font-family="sans-serif" font-size="8"
        font-weight="bold" fill="#fff" text-anchor="middle">C</text>
  <text x="106" y="85" font-family="sans-serif" font-size="8"
        font-weight="bold" fill="#fff" text-anchor="middle">D</text>

  <!-- Base/stand -->
  <rect x="10" y="92" width="108" height="18" rx="4" ry="4"
        fill="#667788" stroke="#556677" stroke-width="2"/>
  <rect x="14" y="92" width="100" height="6" rx="2" ry="2"
        fill="#778899"/>
</svg>
